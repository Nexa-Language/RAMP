# RAMP Docker Compose 配置
# 用于构建和运行评测沙盒

version: "3.8"

services:
  ramp-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.ramp
    image: ramp:latest
    container_name: ramp-sandbox
    volumes:
      - ./YatCC:/workspace/YatCC:rw
      - ./ramp_output:/workspace/ramp_output:rw
    working_dir: /workspace/YatCC
    environment:
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://aihub.arcsysu.cn/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-mimo-v2.5-pro}
    stdin_open: true
    tty: true
    command: sleep infinity