<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — EvoBench</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #111118;
            --bg-secondary: #16161f;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b8;
            --text-muted: #606078;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #06b6d4;
            --border-subtle: #1e1e2e;
            --border-accent: #6366f140;
            --radius-lg: 16px;
            --radius-md: 10px;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; }

        /* Nav */
        .nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-subtle); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); font-weight: 800; font-size: 1.2rem; }
        .logo-icon { font-size: 1.4rem; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link { padding: 8px 16px; border-radius: 8px; text-decoration: none; color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--text-primary); background: rgba(99,102,241,0.1); }

        /* Hero */
        .hero { padding: 140px 24px 40px; text-align: center; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 16px; }
        .gradient-text { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; }

        /* Search & Filter */
        .filter-bar { max-width: 900px; margin: 0 auto 40px; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 12px 16px 12px 44px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-primary); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
        .search-box input:focus { border-color: var(--accent-primary); }
        .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .tag-filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag-chip { padding: 8px 16px; border-radius: 100px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border-subtle); background: var(--bg-card); color: var(--text-secondary); transition: all 0.2s; white-space: nowrap; }
        .tag-chip:hover, .tag-chip.active { background: rgba(99,102,241,0.15); border-color: var(--accent-primary); color: var(--accent-primary); }
        .tag-chip .count { margin-left: 6px; font-size: 0.7rem; opacity: 0.6; }

        /* Blog Grid */
        .blog-grid { max-width: 900px; margin: 0 auto; padding: 0 24px 120px; display: grid; gap: 24px; }
        .blog-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .blog-card:hover { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.08); }
        .blog-card-body { padding: 28px 32px; }
        .blog-card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .blog-card-date { font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono); }
        .blog-card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .blog-card-tag { padding: 3px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 600; background: rgba(99,102,241,0.1); color: var(--accent-primary); }
        .blog-card h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
        .blog-card p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .blog-card-footer { display: flex; align-items: center; gap: 16px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-subtle); }
        .blog-card-footer span { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

        .no-results { text-align: center; padding: 60px 24px; color: var(--text-muted); }
        .no-results i { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.3; }

        @media (max-width: 640px) {
            .blog-card-body { padding: 20px 24px; }
            .filter-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <nav class="nav">
        <div class="nav-container">
            <a href="/" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">EvoBench</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="blog.html" class="nav-link active">Blog</a>
                <a href="https://github.com/Nexa-Language/EvoBench" class="nav-link" target="_blank"><i class="fab fa-github"></i> GitHub</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <h1><span class="gradient-text">Blog</span></h1>
        <p>Deep dives into AI agent evaluation, compiler construction benchmarks, and the frontier of autonomous coding.</p>
    </section>

    <div class="filter-bar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search posts..." oninput="filterPosts()">
        </div>
        <div class="tag-filters" id="tagFilters"></div>
    </div>

    <div class="blog-grid" id="blogGrid"></div>

    <div class="no-results" id="noResults" style="display:none;">
        <i class="fas fa-search"></i>
        <p>No posts match your search.</p>
    </div>

    <script src="assets/js/particles.min.js"></script>
    <script>
        // Particle background
        if (typeof particlesJS !== 'undefined') {
            particlesJS('particles', {
                particles: { number: { value: 40 }, color: { value: '#6366f1' }, opacity: { value: 0.15 }, size: { value: 2 }, line_linked: { enable: true, color: '#6366f1', opacity: 0.08 }, move: { speed: 0.8 } },
                interactivity: { events: { onhover: { enable: true, mode: 'grab' } } }
            });
        }

        const posts = [
            {
                id: '2026-05-13-paper-draft',
                date: 'May 13, 2026',
                title: 'EvoBench Paper Draft Complete: A New Paradigm for Serial Agent Evaluation',
                excerpt: 'Our paper introduces EvoBench — the first serial, artifact-dependent coding benchmark with resurrection mechanism and process-centric evaluation. Here\'s what we found across 22 model configurations.',
                tags: ['Paper', 'Research'],
                readTime: '8 min',
            },
            {
                id: '2026-05-12-leaderboard-analysis',
                date: 'May 12, 2026',
                title: 'Leaderboard Deep Dive: Kimi CLI Dominates, Resurrection Reveals Hidden Capabilities',
                excerpt: 'With 22 models now evaluated, the leaderboard tells a fascinating story. Kimi-k2.6 takes #1 with MR=99.06, but the real insight is in the resurrection data — 17/19 models gain >40 points when cascading failures are bypassed.',
                tags: ['Leaderboard', 'Analysis', 'Results'],
                readTime: '10 min',
            },
            {
                id: '2026-05-10-first-results',
                date: 'May 10, 2026',
                title: 'EvoBench First Results: 19 Models Evaluated on Compiler Construction',
                excerpt: 'The first large-scale evaluation reveals a clear capability cliff between understanding and implementing compilers. Only 2 models achieve zero-shot pipeline success.',
                tags: ['Results', 'Analysis'],
                readTime: '6 min',
            },
            {
                id: '2026-05-03-why-yatcc',
                date: 'May 3, 2026',
                title: 'Why YatCC Is the Perfect Substrate for an Agent Benchmark',
                excerpt: 'Compiler construction provides strict causal dependencies, objective grading, graduated difficulty, and real-world relevance — making it uniquely suited for evaluating agent evolution.',
                tags: ['Research', 'Design'],
                readTime: '5 min',
            },
            {
                id: '2026-04-20-vision',
                date: 'April 20, 2026',
                title: 'Introducing EvoBench: Beyond Static Benchmarks',
                excerpt: 'Current agent benchmarks test isolated tasks. Real engineering is serial. EvoBench introduces a new paradigm: evaluate agents on their ability to evolve through a dependency chain.',
                tags: ['Vision'],
                readTime: '4 min',
            },
        ];

        const allTags = [...new Set(posts.flatMap(p => p.tags))];

        // Render tag filters
        const tagFiltersEl = document.getElementById('tagFilters');
        tagFiltersEl.innerHTML = `
            <span class="tag-chip active" onclick="selectTag('all')">All <span class="count">${posts.length}</span></span>
            ${allTags.map(t => `<span class="tag-chip" onclick="selectTag('${t}')">${t}</span>`).join('')}
        `;

        let activeTag = 'all';

        function selectTag(tag) {
            activeTag = tag;
            document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
            event.target.closest('.tag-chip')?.classList.add('active');
            filterPosts();
        }

        function filterPosts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = posts.filter(p => {
                const matchTag = activeTag === 'all' || p.tags.includes(activeTag);
                const matchSearch = !query || p.title.toLowerCase().includes(query) || p.excerpt.toLowerCase().includes(query) || p.tags.some(t => t.toLowerCase().includes(query));
                return matchTag && matchSearch;
            });

            const grid = document.getElementById('blogGrid');
            const noResults = document.getElementById('noResults');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                grid.innerHTML = filtered.map(p => `
                    <a href="blog/${p.id}.html" class="blog-card">
                        <div class="blog-card-body">
                            <div class="blog-card-meta">
                                <span class="blog-card-date">${p.date}</span>
                                <div class="blog-card-tags">${p.tags.map(t => `<span class="blog-card-tag">${t}</span>`).join('')}</div>
                            </div>
                            <h2>${p.title}</h2>
                            <p>${p.excerpt}</p>
                            <div class="blog-card-footer">
                                <span><i class="far fa-clock"></i> ${p.readTime} read</span>
                                <span><i class="fas fa-arrow-right"></i> Read more</span>
                            </div>
                        </div>
                    </a>
                `).join('');
            }
        }

        filterPosts();
    </script>
</body>
</html>
